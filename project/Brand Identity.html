<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RokHaven Realty — Brand Identity Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Serif+Display:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400;500&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&family=Raleway:wght@100;200;300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F0F0F; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

/* ═══════════════════════════════════════════════
   BRAND DEFINITIONS
═══════════════════════════════════════════════ */
const DIRS = {
  A: {
    name: 'Heritage Gold',
    label: 'A',
    tagline: 'A LEGACY OF LUXURY',
    desc: 'Nigerian Heritage × Global Prestige',
    df: "'Cormorant Garamond', serif",
    bf: "'Jost', sans-serif",
    bg:    '#090807',
    fg:    '#C9A96E',
    fg2:   '#8B7355',
    light: '#F5EDE0',
    muted: '#5C4A38',
    deep:  '#3D2B1F',
  },
  B: {
    name: 'Arch Modern',
    label: 'B',
    tagline: 'WHERE LEGACY LIVES',
    desc: 'International Luxury × Nigerian Earth',
    df: "'DM Serif Display', serif",
    bf: "'DM Sans', sans-serif",
    bg:    '#0B1B35',
    fg:    '#C0A870',
    fg2:   '#527070',
    light: '#F4EDE0',
    muted: '#2A3F5C',
    deep:  '#060F1C',
  },
  C: {
    name: 'Earth Prestige',
    label: 'C',
    tagline: 'CURATED · SECURED · ENDURING',
    desc: 'Modern African Luxury × Distinctive',
    df: "'Libre Baskerville', serif",
    bf: "'Raleway', sans-serif",
    bg:    '#F4EDE0',
    fg:    '#1D2B1F',
    fg2:   '#B8955A',
    light: '#FEFCF8',
    muted: '#8FA98A',
    deep:  '#2C4030',
  },
};

/* ═══════════════════════════════════════════════
   SVG MARKS
═══════════════════════════════════════════════ */

// Direction A: The Jewel — precision diamond with axis lines
const MarkA = ({ color, size }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
    <polygon points="40,2 78,40 40,78 2,40" stroke={color} strokeWidth="1.5"/>
    <polygon points="40,18 62,40 40,62 18,40" stroke={color} strokeWidth="1"/>
    <line x1="40" y1="2"  x2="40" y2="18" stroke={color} strokeWidth="1.5"/>
    <line x1="78" y1="40" x2="62" y2="40" stroke={color} strokeWidth="1.5"/>
    <line x1="40" y1="78" x2="40" y2="62" stroke={color} strokeWidth="1.5"/>
    <line x1="2"  y1="40" x2="18" y2="40" stroke={color} strokeWidth="1.5"/>
    <polygon points="40,33 47,40 40,47 33,40" fill={color}/>
  </svg>
);

// Direction B: The Gateway — arch ring (haven as entrance)
const MarkB = ({ color, size }) => (
  <svg width={size} height={size} viewBox="0 0 60 60" fill={color}>
    <path d="M 5,60 L 5,35 A 25,25 0 0,1 55,35 L 55,60 L 44,60 L 44,35 A 14,14 0 0,0 16,35 L 16,60 Z"/>
  </svg>
);

// Direction C: The Compass — interlocking squares (Nigerian geometric influence)
const MarkC = ({ color, size }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
    <rect x="15" y="15" width="50" height="50" stroke={color} strokeWidth="1.8"/>
    <rect x="15" y="15" width="50" height="50" stroke={color} strokeWidth="1.8" transform="rotate(45 40 40)"/>
    <polygon points="40,33 47,40 40,47 33,40" fill={color}/>
  </svg>
);

const MARKS = { A: MarkA, B: MarkB, C: MarkC };

/* ═══════════════════════════════════════════════
   LOGO BUILDING BLOCKS
═══════════════════════════════════════════════ */

const Wordmark = ({ dir, color, size }) => {
  const d = DIRS[dir];
  return (
    <div>
      <div style={{ fontFamily: d.df, fontSize: size, color, letterSpacing: '0.22em', fontWeight: 300, lineHeight: 1 }}>
        ROKHAVEN
      </div>
      <div style={{ fontFamily: d.bf, fontSize: size * 0.44, color, letterSpacing: '0.46em', fontWeight: 300, marginTop: size * 0.18, opacity: 0.65 }}>
        REALTY
      </div>
    </div>
  );
};

const StackedLogo = ({ dir, color, ms }) => {
  const Mark = MARKS[dir];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: ms * 0.24 }}>
      <Mark color={color} size={ms} />
      <div style={{ textAlign: 'center' }}>
        <Wordmark dir={dir} color={color} size={ms * 0.3} />
      </div>
    </div>
  );
};

const HorizLogo = ({ dir, color, ms }) => {
  const Mark = MARKS[dir];
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: ms * 0.42 }}>
      <Mark color={color} size={ms} />
      <Wordmark dir={dir} color={color} size={ms * 0.44} />
    </div>
  );
};

/* ═══════════════════════════════════════════════
   LOGO DIRECTION BOARD  760 × 580
═══════════════════════════════════════════════ */

const LogoBoard = ({ dir }) => {
  const d = DIRS[dir];
  const isC = dir === 'C';
  const Mark = MARKS[dir];

  // Reversed panel colours
  const revBg  = isC ? d.fg  : d.light;
  const revFg  = isC ? d.fg2 : d.bg;

  return (
    <div style={{ width: 760, height: 580, background: d.bg, display: 'flex', fontFamily: d.bf, overflow: 'hidden' }}>

      {/* LEFT — primary hero presentation */}
      <div style={{
        flex: '0 0 400',
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        padding: '40px',
        borderRight: `1px solid ${d.fg}18`,
      }}>
        <div style={{ fontSize: 7, letterSpacing: '0.42em', color: d.fg, opacity: 0.32, marginBottom: 32, fontFamily: d.bf }}>
          DIRECTION {dir}
        </div>
        <StackedLogo dir={dir} color={d.fg} ms={104} />
        <div style={{ marginTop: 28, fontFamily: d.bf, fontSize: 7.5, letterSpacing: '0.26em', color: d.fg, opacity: 0.52 }}>
          {d.tagline}
        </div>
        <div style={{ marginTop: 8, fontSize: 6.5, color: d.fg, opacity: 0.22, letterSpacing: '0.12em', fontFamily: d.bf }}>
          {d.desc}
        </div>
      </div>

      {/* RIGHT — logo system */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>

        {/* Horizontal lockup */}
        <div style={{ flex: 1, padding: '22px 26px', borderBottom: `1px solid ${d.fg}10`, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div style={{ fontSize: 6.5, letterSpacing: '0.34em', color: d.fg, opacity: 0.26, marginBottom: 13, fontFamily: d.bf }}>
            HORIZONTAL LOCKUP
          </div>
          <HorizLogo dir={dir} color={d.fg} ms={34} />
        </div>

        {/* Reversed (light) version */}
        <div style={{ flex: 1, padding: '22px 26px', borderBottom: `1px solid ${d.fg}10`, background: revBg, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div style={{ fontSize: 6.5, letterSpacing: '0.34em', color: revFg, opacity: 0.28, marginBottom: 13, fontFamily: d.bf }}>
            REVERSED VERSION
          </div>
          <HorizLogo dir={dir} color={revFg} ms={30} />
        </div>

        {/* Icon only + full lockup with tagline */}
        <div style={{ flex: 1, padding: '18px 26px', display: 'flex', alignItems: 'center', gap: 20 }}>
          <div>
            <div style={{ fontSize: 6.5, letterSpacing: '0.34em', color: d.fg, opacity: 0.26, marginBottom: 10, fontFamily: d.bf }}>
              MARK ONLY
            </div>
            <Mark color={d.fg} size={44} />
          </div>

          <div style={{ width: 1, height: 52, background: d.fg, opacity: 0.1 }} />

          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 6.5, letterSpacing: '0.34em', color: d.fg, opacity: 0.26, marginBottom: 10, fontFamily: d.bf }}>
              WITH TAGLINE
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
              <Mark color={d.fg} size={28} />
              <div>
                <div style={{ fontFamily: d.df, fontSize: 12, color: d.fg, letterSpacing: '0.2em', fontWeight: 300 }}>ROKHAVEN</div>
                <div style={{ fontFamily: d.bf, fontSize: 5.5, color: d.fg, letterSpacing: '0.44em', opacity: 0.55, marginTop: 2 }}>REALTY</div>
                <div style={{ height: '0.5px', background: d.fg, opacity: 0.18, margin: '5px 0' }} />
                <div style={{ fontFamily: d.bf, fontSize: 5.5, color: d.fg, letterSpacing: '0.18em', opacity: 0.4 }}>{d.tagline}</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   BRAND SYSTEM BOARD  640 × 920
═══════════════════════════════════════════════ */

const BrandSystem = ({ dir }) => {
  const d = DIRS[dir];
  const tx = d.fg;
  const border = `1px solid ${tx}0E`;

  const palette = dir === 'A'
    ? [{ l: 'OBSIDIAN',     h: d.bg,   r: 'Background' },
       { l: 'ANTIQUE GOLD', h: d.fg,   r: 'Primary'    },
       { l: 'WARM BRONZE',  h: d.fg2,  r: 'Accent'     },
       { l: 'IVORY',        h: d.light,r: 'Light'      },
       { l: 'KOLA BROWN',   h: d.muted,r: 'Supporting' }]
    : dir === 'B'
    ? [{ l: 'MIDNIGHT NAVY', h: d.bg,   r: 'Background' },
       { l: 'BRONZE GOLD',  h: d.fg,   r: 'Primary'    },
       { l: 'SLATE TEAL',   h: d.fg2,  r: 'Accent'     },
       { l: 'WARM IVORY',   h: d.light,r: 'Light'      },
       { l: 'DEEP MUTED',   h: d.muted,r: 'Supporting' }]
    : [{ l: 'IVORY',        h: d.bg,   r: 'Background' },
       { l: 'DEEP FOREST',  h: d.fg,   r: 'Primary'    },
       { l: 'BRONZE',       h: d.fg2,  r: 'Accent'     },
       { l: 'WARM WHITE',   h: d.light,r: 'Light'      },
       { l: 'SAGE',         h: d.muted,r: 'Supporting' }];

  const displaySample = dir === 'A' ? 'Abuja' : dir === 'B' ? 'Ikoyi' : 'Lagos';
  const displayQuote = '"Where every property tells a story of legacy."';
  const displayName = d.df.replace(/'/g, '').split(',')[0];
  const bodyName    = d.bf.replace(/'/g, '').split(',')[0];

  return (
    <div style={{ width: 640, height: 920, background: d.bg, padding: '36px 36px 28px', fontFamily: d.bf, overflow: 'hidden' }}>
      <div style={{ fontSize: 7, letterSpacing: '0.42em', color: tx, opacity: 0.3, marginBottom: 28 }}>
        BRAND SYSTEM — {d.name.toUpperCase()}
      </div>

      {/* Colour palette */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontSize: 7, letterSpacing: '0.32em', color: tx, opacity: 0.4, marginBottom: 12 }}>COLOUR PALETTE</div>
        <div style={{ display: 'flex', gap: 1 }}>
          {palette.map((c, i) => (
            <div key={i} style={{ flex: i === 0 ? 2 : 1 }}>
              <div style={{ height: 60, background: c.h, border: `1px solid ${tx}09` }} />
              <div style={{ paddingTop: 6, paddingRight: 2 }}>
                <div style={{ fontSize: 6.5, color: tx, opacity: 0.7, letterSpacing: '0.04em' }}>{c.l}</div>
                <div style={{ fontSize: 6, color: tx, opacity: 0.32, fontFamily: 'monospace', marginTop: 1 }}>{c.h}</div>
                <div style={{ fontSize: 5.5, color: tx, opacity: 0.27, letterSpacing: '0.07em', marginTop: 1 }}>{c.r}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Brand pattern */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontSize: 7, letterSpacing: '0.32em', color: tx, opacity: 0.4, marginBottom: 12 }}>BRAND PATTERN</div>
        <div style={{
          height: 78,
          border: `1px solid ${tx}09`,
          backgroundImage: `repeating-linear-gradient(45deg, ${d.fg}08 0, ${d.fg}08 1px, transparent 0, transparent 50%), repeating-linear-gradient(-45deg, ${d.fg}08 0, ${d.fg}08 1px, transparent 0, transparent 50%)`,
          backgroundSize: '16px 16px',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{ fontFamily: d.df, fontSize: 48, color: d.fg, opacity: 0.07, letterSpacing: '0.22em', fontWeight: 300 }}>RH</div>
        </div>
      </div>

      {/* Display typeface */}
      <div style={{ paddingBottom: 24, borderBottom: border, marginBottom: 22 }}>
        <div style={{ fontSize: 7, letterSpacing: '0.32em', color: tx, opacity: 0.4, marginBottom: 12 }}>DISPLAY TYPEFACE</div>
        <div style={{ fontFamily: d.df, fontSize: 52, color: tx, fontWeight: 300, lineHeight: 1, letterSpacing: '-0.01em' }}>{displaySample}</div>
        <div style={{ fontFamily: d.df, fontSize: 12, color: tx, opacity: 0.45, marginTop: 9, fontStyle: 'italic', lineHeight: 1.55 }}>{displayQuote}</div>
        <div style={{ fontSize: 6, color: tx, opacity: 0.26, marginTop: 7, fontFamily: 'monospace', letterSpacing: '0.1em' }}>
          {displayName} — Light / Regular / Italic
        </div>
      </div>

      {/* Body typeface */}
      <div style={{ paddingBottom: 24, borderBottom: border, marginBottom: 22 }}>
        <div style={{ fontSize: 7, letterSpacing: '0.32em', color: tx, opacity: 0.4, marginBottom: 12 }}>BODY TYPEFACE</div>
        <div style={{ fontFamily: d.bf, fontSize: 20, color: tx, fontWeight: 200, letterSpacing: '0.08em' }}>Aa Bb Cc Dd Ee Ff Gg</div>
        <div style={{ fontFamily: d.bf, fontSize: 9.5, color: tx, opacity: 0.48, marginTop: 9, lineHeight: 1.8, fontWeight: 300 }}>
          RokHaven provides exclusive access to Nigeria's most prestigious properties — curated portfolios combining local expertise with global standards of excellence.
        </div>
        <div style={{ fontSize: 6, color: tx, opacity: 0.26, marginTop: 7, fontFamily: 'monospace', letterSpacing: '0.1em' }}>
          {bodyName} — Thin / Light / Regular
        </div>
      </div>

      {/* Type scale */}
      <div>
        <div style={{ fontSize: 7, letterSpacing: '0.32em', color: tx, opacity: 0.4, marginBottom: 12 }}>TYPE SCALE</div>
        {[
          { lbl: 'DISPLAY', size: 30, font: d.df, wt: 300,  sp: '-0.01em', sample: 'Ikoyi Luxury Estate'       },
          { lbl: 'H2',      size: 18, font: d.df, wt: 400,  sp: '0.01em',  sample: 'Premium Residences'         },
          { lbl: 'LABEL',   size: 8,  font: d.bf, wt: 400,  sp: '0.28em',  sample: 'AVAILABLE LISTINGS'         },
          { lbl: 'BODY',    size: 10, font: d.bf, wt: 300,  sp: '0.02em',  sample: 'Tailored to your vision of luxury' },
          { lbl: 'CAPTION', size: 7,  font: d.bf, wt: 300,  sp: '0.05em',  sample: 'All prices in Nigerian Naira', op: 0.42 },
        ].map((t, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'baseline', gap: 12, paddingBottom: 8, borderBottom: `1px solid ${tx}07`, marginBottom: 8 }}>
            <div style={{ width: 50, fontSize: 5.5, color: tx, opacity: 0.25, letterSpacing: '0.1em', flexShrink: 0, fontFamily: d.bf }}>{t.lbl}</div>
            <div style={{ fontFamily: t.font, fontSize: t.size, color: tx, fontWeight: t.wt, letterSpacing: t.sp, opacity: t.op || 0.82, overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>
              {t.sample}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   BUSINESS CARD  (two cards: 390×230 each, board 820×290)
═══════════════════════════════════════════════ */

const CardFront = ({ dir }) => {
  const d = DIRS[dir];
  const isC = dir === 'C';
  const cardBg = isC ? d.fg : d.bg;
  const accentCol = isC ? d.fg2 : d.fg;
  const nameCol = isC ? d.light : d.light;
  const Mark = MARKS[dir];
  return (
    <div style={{ width: 390, height: 230, background: cardBg, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '22px 26px', position: 'relative', overflow: 'hidden', fontFamily: d.bf, boxShadow: '0 3px 22px rgba(0,0,0,0.28)' }}>
      <div style={{ position: 'absolute', right: 0, top: 0, width: 80, height: 80, background: accentCol, opacity: 0.07, clipPath: 'polygon(100% 0, 100% 100%, 0 0)' }} />
      <HorizLogo dir={dir} color={accentCol} ms={22} />
      <div>
        <div style={{ fontFamily: d.df, fontSize: 16, color: nameCol, fontWeight: dir === 'B' ? 400 : 300, marginBottom: 4 }}>Adebayo Osei</div>
        <div style={{ fontSize: 6.5, color: accentCol, letterSpacing: '0.22em', fontWeight: 300, opacity: 0.9, marginBottom: 10 }}>SENIOR PROPERTY ADVISOR</div>
        <div style={{ height: '0.75px', background: accentCol, opacity: 0.2, marginBottom: 8 }} />
        <div style={{ display: 'flex', gap: 14 }}>
          <div style={{ fontSize: 7.5, color: nameCol, opacity: 0.4, fontWeight: 300 }}>+234 800 000 0000</div>
          <div style={{ fontSize: 7.5, color: nameCol, opacity: 0.4, fontWeight: 300 }}>rokhaven.com</div>
        </div>
      </div>
    </div>
  );
};

const CardBack = ({ dir }) => {
  const d = DIRS[dir];
  const isC = dir === 'C';
  const cardBg = isC ? d.fg2 : d.fg;
  const markCol = isC ? d.bg : d.bg;
  const Mark = MARKS[dir];
  return (
    <div style={{ width: 390, height: 230, background: cardBg, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, boxShadow: '0 3px 22px rgba(0,0,0,0.28)' }}>
      <Mark color={markCol} size={52} />
      <div style={{ fontFamily: d.bf, fontSize: 6.5, color: markCol, letterSpacing: '0.28em', opacity: 0.5 }}>{d.tagline}</div>
    </div>
  );
};

const BizCardBoard = ({ dir }) => {
  const d = DIRS[dir];
  const panelBg = dir === 'C' ? '#DED5C2' : '#181818';
  const lblCol  = dir === 'C' ? '#998B7A' : '#5A5A5A';
  return (
    <div style={{ width: 820, height: 290, background: panelBg, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 22, padding: '24px', fontFamily: d.bf }}>
      <div>
        <div style={{ fontSize: 6, letterSpacing: '0.32em', color: lblCol, marginBottom: 9 }}>FRONT</div>
        <CardFront dir={dir} />
      </div>
      <div>
        <div style={{ fontSize: 6, letterSpacing: '0.32em', color: lblCol, marginBottom: 9 }}>BACK</div>
        <CardBack dir={dir} />
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   LETTERHEAD  560 × 800
═══════════════════════════════════════════════ */

const LetterheadBoard = ({ dir }) => {
  const d = DIRS[dir];
  const isC = dir === 'C';
  const headBg   = isC ? d.fg    : d.bg;
  const headCol  = isC ? d.fg2   : d.fg;
  const paperBg  = '#FEFCF8';
  const textCol  = isC ? d.fg    : d.deep;
  const accentCol = d.fg;
  const Mark = MARKS[dir];
  return (
    <div style={{ width: 560, height: 800, background: paperBg, display: 'flex', flexDirection: 'column', overflow: 'hidden', boxShadow: '0 6px 28px rgba(0,0,0,0.14)', fontFamily: d.bf }}>
      <div style={{ background: headBg, padding: '18px 34px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <HorizLogo dir={dir} color={headCol} ms={24} />
        <div style={{ textAlign: 'right', fontSize: 6.5, color: headCol, opacity: 0.52, lineHeight: 1.9, letterSpacing: '0.1em' }}>
          <div>rokhaven.com</div>
          <div>Lagos · Abuja, Nigeria</div>
        </div>
      </div>
      <div style={{ height: 2, background: accentCol, flexShrink: 0 }} />

      <div style={{ flex: 1, padding: '38px 42px 28px', display: 'flex', flexDirection: 'column' }}>
        <div style={{ marginBottom: 30 }}>
          <div style={{ fontSize: 6.5, letterSpacing: '0.32em', color: textCol, opacity: 0.32, marginBottom: 5 }}>DATE</div>
          <div style={{ fontSize: 9.5, color: textCol, opacity: 0.45, fontWeight: 300 }}>May 16, 2026</div>
        </div>

        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: d.df, fontSize: 22, color: textCol, fontWeight: 300, lineHeight: 1.2, marginBottom: 6 }}>
            Property Proposal
          </div>
          <div style={{ fontSize: 7, letterSpacing: '0.26em', color: accentCol }}>IKOYI LUXURY RESIDENCE</div>
        </div>

        <div style={{ height: '1px', background: textCol, opacity: 0.08, marginBottom: 22 }} />

        <div style={{ fontFamily: d.bf, fontSize: 10, color: textCol, fontWeight: 300, lineHeight: 1.95, opacity: 0.58 }}>
          <p style={{ marginBottom: 14 }}>Dear Mr. Adesanya,</p>
          <p style={{ marginBottom: 14 }}>
            We are pleased to present this exclusive property proposal, carefully curated from our portfolio of premium residences across Lagos's most prestigious neighbourhoods.
