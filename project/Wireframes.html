          <div style={{gridColumn:'1/-1'}}><WLbl style={{marginBottom:8}}>Location / Address</WLbl><WInput placeholder="Full property address or area"/></div>
        </div>
      </WBox>

      {/* Specs */}
      <WBox lbl="PROPERTY SPECS" style={{padding:20,background:WF.surf,marginBottom:16}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
          {[['Bedrooms','e.g. 5'],['Bathrooms','e.g. 6'],['Size (sqm)','e.g. 850']].map(([l,p])=>(
            <div key={l}><WLbl style={{marginBottom:8}}>{l}</WLbl><WInput placeholder={p}/></div>
          ))}
        </div>
      </WBox>

      {/* Description */}
      <WBox lbl="DESCRIPTION" style={{padding:20,background:WF.surf,marginBottom:16}}>
        <div style={{height:100,border:`1px solid ${WF.border}`,borderRadius:3,background:WF.bg,padding:'12px 14px'}}>
          <WStr size={11} muted>Write a detailed property description…</WStr>
        </div>
      </WBox>

      {/* Features */}
      <WBox lbl="FEATURES & AMENITIES" style={{padding:20,background:WF.surf,marginBottom:16}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {['Swimming Pool','BQ / Staff Quarters','Gym','24/7 Security','Generator','Parking','Smart Home','Sea View','Home Theatre'].map(f=>(
            <div key={f} style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:16,height:16,border:`1px solid ${WF.border}`,borderRadius:2,flexShrink:0}}/>
              <WStr size={11}>{f}</WStr>
            </div>
          ))}
        </div>
      </WBox>

      {/* Upload photos */}
      <WBox lbl="UPLOAD PHOTOS" dashed style={{marginBottom:16,height:120,background:WF.surf,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10}}>
        <WStr size={12} muted>Drag & drop photos here, or</WStr>
        <WBtn sm>Browse Files</WBtn>
      </WBox>

      {/* Upload video */}
      <WBox lbl="UPLOAD VIDEO" dashed style={{marginBottom:36,height:80,background:WF.surf,display:'flex',alignItems:'center',justifyContent:'center',gap:16}}>
        <WStr size={12} muted>Upload video file or paste embed URL</WStr>
      </WBox>

      <WBtn accent style={{width:'100%',height:50,fontSize:11}}>Publish Listing</WBtn>
    </div>

    {/* PREVIEW PANEL */}
    <div style={{padding:'32px 24px'}}>
      <WLbl style={{marginBottom:16}}>Listing Preview</WLbl>
      <WCard style={{width:'100%'}}/>
      <Ann style={{marginTop:12}}>Card preview updates live as fields are filled</Ann>
      <div style={{marginTop:24,padding:'16px',background:WF.surf,borderRadius:3,border:`1px solid ${WF.border}`}}>
        <WLbl style={{marginBottom:10}}>Publishing Options</WLbl>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {['Mark as Featured','Mark as New','Publish immediately'].map(o=>(
            <div key={o} style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:16,height:16,border:`1px solid ${WF.border}`,borderRadius:2}}/>
              <WStr size={11}>{o}</WStr>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>
);

          <div><WLbl style={{marginBottom:8}}>Bedrooms</WLbl><WDrop label="Select"/></div>
          <div style={{gridColumn:'1/-1'}}>
