<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Profile — RokHaven Realty</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1B35;--gold:#C0A870;--deep:#2A3F5C;--obs:#060F1C;--ivory:#F4EDE0;--fd:'DM Serif Display',serif;--fb:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--ivory);font-family:var(--fb);font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
a{text-decoration:none;}
nav{height:72px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(192,168,112,.1);background:rgba(11,27,53,.97);}
.nav-logo{display:flex;align-items:center;gap:12px;}
.wm{font-family:var(--fd);font-size:15px;color:var(--gold);letter-spacing:.22em;}
.sm{font-size:7px;font-weight:200;color:var(--gold);letter-spacing:.46em;opacity:.55;margin-top:3px;}
.nav-back{font-size:11px;font-weight:300;color:rgba(244,237,224,.35);letter-spacing:.1em;transition:color .2s;}
.nav-back:hover{color:var(--gold);}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{width:100%;max-width:480px;background:var(--deep);border:1px solid rgba(192,168,112,.14);border-radius:4px;border-top:3px solid var(--gold);padding:44px 40px 40px;}
.card-logo{display:flex;align-items:center;gap:11px;margin-bottom:28px;}
.card-lbl{font-size:8.5px;font-weight:500;color:var(--gold);letter-spacing:.44em;text-transform:uppercase;margin-bottom:10px;opacity:.75;}
.card-h{font-family:var(--fd);font-size:32px;color:var(--ivory);margin-bottom:8px;line-height:1.1;}
.card-sub{font-size:13px;color:rgba(244,237,224,.42);line-height:1.75;margin-bottom:32px;}
.f-row{margin-bottom:22px;}
.f-lbl{display:block;font-size:8px;font-weight:500;color:rgba(192,168,112,.45);letter-spacing:.28em;text-transform:uppercase;margin-bottom:9px;}
.f-wrap{position:relative;border-bottom:1.5px solid rgba(192,168,112,.2);}
.f-wrap::after{content:'';position:absolute;bottom:-1.5px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.f-wrap:focus-within{border-color:transparent;}
.f-wrap:focus-within::after{transform:scaleX(1);}
.f-in{width:100%;background:transparent;border:none;outline:none;font-family:var(--fb);font-size:16px;font-weight:300;color:var(--ivory);padding:10px 0;}
.f-in::placeholder{color:rgba(244,237,224,.25);}
.ph-row{display:flex;align-items:center;border-bottom:1.5px solid rgba(192,168,112,.2);}
.ph-row::after{display:none;}
.ph-flag{font-size:16px;padding:10px 10px 10px 0;color:rgba(244,237,224,.35);white-space:nowrap;flex-shrink:0;}
.ph-row .f-in{border-bottom:none;}
.f-eye{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(244,237,224,.3);font-size:14px;padding:4px;}
.f-eye:hover{color:rgba(244,237,224,.6);}

/* PASSWORD STRENGTH */
.pw-str{display:flex;gap:5px;margin-top:8px;}
.pw-bar{flex:1;height:2px;border-radius:1px;background:rgba(192,168,112,.1);transition:background .3s;}
.pw-bar.weak{background:#E07070;}
.pw-bar.fair{background:#E0B44A;}
.pw-bar.strong{background:#5DC882;}
.pw-txt{font-size:10px;color:rgba(244,237,224,.28);margin-top:5px;}

.btn-gold{width:100%;padding:15px;background:var(--gold);color:var(--obs);font-family:var(--fb);font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;border:none;border-radius:2px;cursor:pointer;transition:filter .2s;margin-bottom:14px;}
.btn-gold:hover{filter:brightness(1.07);}
.terms{font-size:11px;color:rgba(244,237,224,.22);text-align:center;line-height:1.75;margin-bottom:24px;}
.terms a{color:rgba(192,168,112,.5);transition:color .2s;}
.terms a:hover{color:var(--gold);}
.card-rule{height:1px;background:rgba(192,168,112,.1);margin-bottom:20px;}
.card-foot{text-align:center;font-size:12.5px;color:rgba(244,237,224,.32);line-height:2.1;}
.card-foot a{color:var(--gold);}
@media(max-width:540px){nav{padding:0 20px;}.card{padding:32px 22px 28px;}}


/* ─── TYPOGRAPHY SCALE ENFORCEMENT V2 (16px MIN, NO SCALE-DOWN) ─── */
body{font-size:16px!important;line-height:1.6;}

/* Hero headline 72-80px on 1440px desktop */
.hero h1{font-size:clamp(56px,6vw,80px)!important;line-height:1.08;}
.hero-h{font-size:clamp(48px,5.5vw,76px)!important;line-height:1.1;}

/* Section headings — bumped */
.sec-h{font-size:clamp(36px,3.2vw,50px)!important;line-height:1.15;}
.pg-h{font-size:clamp(28px,2.8vw,36px)!important;}
.pg-greeting{font-size:clamp(32px,3.2vw,44px)!important;line-height:1.15;}
.ph-h{font-size:clamp(40px,4vw,58px)!important;line-height:1.1;}
.page-title{font-size:clamp(40px,4vw,58px)!important;line-height:1.1;}
.prop-name{font-size:clamp(40px,4vw,54px)!important;line-height:1.1;}
.q-text{font-size:clamp(28px,3.4vw,44px)!important;line-height:1.18;}

/* Body / paragraph text — 16-18px */
p,.body-txt,.hero-sub,.story-p,.promise-sub,.pdesc,.prop-desc,.pg-sub,.greeting-sub,
.fc-sub,.ph-sub,.sp-sub,.fs-sub,.card-sub,.form-sub,
.empty-p,.es-sub,.tog-sub,.wp-desc,.psb-loc,
.foot-tag,.suc-b,.cf-b,.confirm-body{font-size:17px!important;line-height:1.75;}
.hero-sub{font-size:18px!important;}
.q-sub{font-size:17px!important;line-height:1.7;}

/* Property card text — readable sizes */
.cname,.mini-name,.lcard-name{font-size:22px!important;}
.cprice{font-size:18px!important;font-weight:500;}
.mini-price,.lcard-price{font-size:16px!important;}
.cloc{font-size:14px!important;}
.cmeta,.cmeta span,.lcard-meta{font-size:14px!important;}
.clink{font-size:13px!important;}

/* List / table row content */
.insp-name,.pr-name,.prop-name-cell,.pc-name,.lead-name,.lead-prop{font-size:16px;}

/* Form inputs — minimum 16px */
.fi,.fq-in,.f-in,.fq-input,.pfq-input,.t-in,.login-in,.dt-in,.fsel,.f-sel,.fq-sel,
.pfq-select,.fta,.fq-ta,.t-area,.fq-textarea,.pfq-textarea{font-size:16px!important;}
.t-in{font-size:clamp(22px,2.8vw,32px)!important;}
.fq-lbl,.f-lbl,.pfq-lbl,.login-lbl{font-size:11px;letter-spacing:.28em;}

/* Checkboxes & options */
.chk-txt,.mf-txt,.feat-txt{font-size:15px!important;line-height:1.75;}
.opt-lb{font-size:16px!important;}
.mopt,.popt,.pill,.role-pill{font-size:14px!important;}

/* Navigation */
.nav-links a,.nav-cta{font-size:14px!important;letter-spacing:.18em;}
.sb-link{font-size:14px!important;}
.tab,.stab{font-size:14px!important;}
.tn-mode{font-size:11px;}

/* Buttons — body text minimum but uppercase tracking */
.btn-gold,.btn-gold-full,.btn-gen,.btn-add,.btn-publish,.btn-submit,.btn-next,
.btn-primary,.btn-outline,.btn-wa,.cf-btn,.cta-btn,.tb-btn,.btn-browse,
.login-btn,.btn-otp,.btn-gold-sm,.ss-btn,.confirm-btn{font-size:13px!important;letter-spacing:.18em;}
.btn-gold-full,.btn-submit,.btn-next{padding:18px!important;}

/* Small buttons / links */
.btn-sm,.btn-sm-outline,.btn-sm-g,.btn-copy,.btn-cancel-sm,.btn-cancel{font-size:12px!important;}
.lcbtn,.ra-btn{font-size:11px!important;}
.ir-link,.empty-cta,.link-gold,.sec-link{font-size:13px!important;}

/* Notes & supporting copy */
.cta-reassure,.sub-note,.form-note,.terms{font-size:13px!important;line-height:1.7;}
.confirm-ref{font-size:13px;}
.cf-si{font-size:18px!important;}

/* Stats */
.sc-num,.stat-n{font-size:42px!important;line-height:1;}
.sc-lbl,.stat-l{font-size:13px!important;}
.spec-val{font-size:22px!important;}
.spec-lbl{font-size:11px;}

/* Sidebar / footer details */
.sb-uname,.sb-name{font-size:14px!important;}
.sb-urole,.sb-role{font-size:11px;letter-spacing:.1em;}
.foot-copy{font-size:13px!important;}
.foot-tagline{font-size:16px!important;}
.flinks a{font-size:14px!important;}

/* Logo wordmarks — keep brand-defined sizes */
.wm{font-size:18px;}
.sm{font-size:10px;}
.sb-wm{font-size:16px;}
.sb-sm{font-size:9px;}

@media(max-width:540px){
  .hero h1,.hero-h{font-size:42px!important;}
  .pg-greeting,.page-title,.prop-name,.ph-h{font-size:32px!important;}
  .sec-h{font-size:28px!important;}
}

/* ─── MOBILE RESPONSIVE V3 (375px first) ─── */
@media(max-width:768px){
  /* GLOBAL */
  body{font-size:16px;}
  *,*::before,*::after{-webkit-tap-highlight-color:transparent;}

  /* NAV — hide desktop links, show hamburger */
  #nav,nav{padding:0 16px!important;height:64px!important;}
  .nav-links{display:none!important;}
  .nav-cta{display:none!important;}
  .nav-cta-mobile{display:none!important;}
  button[onclick="openLoginOverlay()"]{display:none!important;}
  .nav-hamburger{display:flex!important;}

  /* HERO */
  .hero{min-height:540px!important;height:100vh!important;}
  .hero h1{font-size:42px!important;line-height:1.1!important;}
  .hero-sub{font-size:16px!important;margin-bottom:28px!important;padding:0 12px;}
  .eyebrow{font-size:10px!important;margin-bottom:18px!important;}
  .search-bar{flex-direction:column!important;max-width:calc(100% - 24px)!important;margin:0 12px!important;}
  .sf{border-right:none!important;border-bottom:1px solid rgba(192,168,112,.12)!important;padding:14px 18px!important;width:100%;}
  .btn-gold{width:100%;padding:16px!important;font-size:14px!important;min-height:52px;}
  .scroll-ind{display:none!important;}

  /* BRAND STRIP */
  .strip{gap:14px!important;padding:14px 16px!important;overflow-x:auto;flex-wrap:nowrap!important;justify-content:flex-start!important;}
  .strip span{font-size:9px!important;white-space:nowrap;}

  /* CONTAINER */
  .container,.page-hdr>div,.main>div{padding-left:16px!important;padding-right:16px!important;}
  .container{padding:0 16px!important;}

  /* SECTIONS */
  .featured,.why{padding:56px 0!important;}
  .feat-hdr{flex-direction:column;align-items:flex-start;gap:14px;margin-bottom:32px!important;}
  .sec-h{font-size:30px!important;}

  /* FEATURED PROPERTIES — horizontal scroll */
  .pgrid{display:flex!important;grid-template-columns:none!important;overflow-x:auto;scroll-snap-type:x mandatory;gap:14px!important;padding:0 16px 8px!important;margin:0 -16px!important;scrollbar-width:none;}

  /* WHY ROKHAVEN */
  .pillars{grid-template-columns:1fr!important;gap:32px!important;}
  .pillar{text-align:left;}
  .pline{margin-left:0!important;}

  /* FOOTER */
  .foot-grid{grid-template-columns:1fr 1fr!important;gap:32px 16px!important;}
  footer .container{padding:0 16px!important;}

  /* LISTINGS PAGE */
  .page-hdr{padding:96px 16px 32px!important;}
  .page-title{font-size:32px!important;}
  .search-section{padding:14px 16px!important;}
  .filter-wrap{position:relative!important;top:auto!important;}
  .filter-row{padding:8px 16px!important;overflow-x:auto;flex-wrap:nowrap!important;-webkit-overflow-scrolling:touch;}
  .filter-row::-webkit-scrollbar{display:none;}
  .filter-row > *{flex-shrink:0;}
  .results-bar{padding:12px 16px!important;flex-wrap:wrap;gap:10px;}
  .grid-section{padding:20px 16px 56px!important;}
  .pcard{cursor:pointer;}

  /* PROPERTY DETAIL */
  .gallery-hero{height:280px!important;}
  .gthumb{width:120px!important;height:70px!important;}
  .page{display:block!important;padding:24px 16px 96px!important;grid-template-columns:1fr!important;gap:0!important;}
  .left,.right{width:100%;}
  .right{margin-top:32px;}
  .cta-card{position:fixed!important;top:auto!important;bottom:0!important;left:0!important;right:0!important;z-index:90;border-radius:0!important;background:#142236!important;box-shadow:0 -8px 24px rgba(0,0,0,.5);padding:14px 16px!important;display:flex;align-items:center;gap:12px;}
  .cta-card .cta-thumb,.cta-card .cta-thumb-ov,.cta-card .cta-name,.cta-card .cta-price,.cta-card .cta-rule,.cta-card .cta-heading,.cta-card .cta-sub,.cta-card .cta-reassure{display:none!important;}
  .cta-card .cta-body{padding:0!important;flex:1;display:flex;align-items:center;gap:12px;}
  .cta-card .cta-btn{width:100%!important;padding:14px!important;font-size:13px!important;min-height:48px;margin:0!important;}
  .vid-outer.pt{height:380px!important;}
  .vid-outer.pt iframe,.vid-outer.pt .vid-pt-thumb{height:380px!important;width:calc(380px * 9/16)!important;}
  .details{grid-template-columns:1fr 1fr!important;}
  .prop-name{font-size:32px!important;}

  /* FORMS — general */
  .fq-input,.fq-in,.f-in,.fq-input,.pfq-input,.t-in,.login-in,.dt-in,.fsel,.f-sel,
  .fq-sel,.pfq-select,.fta,.fq-ta,.t-area,.fq-textarea,.pfq-textarea,.fi{
    font-size:16px!important;min-height:48px;padding:14px 16px!important;
  }
  textarea.fta,textarea.fq-ta,textarea.t-area,textarea.fq-textarea,textarea.pfq-textarea{min-height:100px;}

  /* SCHEDULE INSPECTION */
  .shell{flex-direction:column!important;}
  .prop-col{width:100%!important;position:relative!important;height:auto!important;}
  .psb-img{height:140px!important;}
  .prop-inner{padding:14px 16px!important;}
  .step-track{display:none!important;}
  .step-track-lbl{display:none!important;}
  .form-col{padding:24px 16px 84px!important;}
  .progress-wrap{margin-bottom:24px!important;}
  .form-h{font-size:28px!important;}
  .btn-next{position:fixed!important;bottom:0!important;left:0!important;right:0!important;z-index:90;border-radius:0!important;min-height:56px;font-size:14px!important;}
  .btn-row{padding-bottom:0;}
  .btn-back{order:-1;margin-bottom:12px;}

  /* ENQUIRY FORM */
  #topNav{padding:0 12px!important;height:56px!important;}
  #propSidebar{display:none!important;}
  #progWrap{padding:12px 16px 0!important;}
  .step{padding:24px 20px 100px!important;justify-content:flex-start!important;}
  #botNav{position:fixed!important;bottom:0!important;left:0!important;right:0!important;padding:14px 16px!important;background:rgba(11,27,53,.95);backdrop-filter:blur(10px);z-index:90;}

  .q-sub{font-size:15px!important;}
  .opts,.mopts,.t-wrap,.ph-row,.t-area{max-width:100%!important;width:100%;}
  .opt{padding:16px!important;min-height:56px;}
  .mopt{min-height:48px;padding:14px 18px!important;}

  .prop-card{flex-direction:column!important;align-items:flex-start;gap:12px;}
  .prop-thumb-sm{width:100%!important;height:120px!important;}

  .page{padding:32px 16px!important;}
  .card{padding:32px 24px!important;border-radius:3px!important;width:100%!important;}
  .card-h{font-size:30px!important;}
  .card-logo{margin-bottom:24px!important;}
  .btn-gold{min-height:52px;}
  .btn-otp{min-height:48px;}
  .login-wrap{padding:36px 24px!important;width:100%!important;}
  .login-h{font-size:24px!important;}

  /* LIST YOUR PROPERTY */
  .main{padding:24px 16px 56px!important;grid-template-columns:1fr!important;gap:32px!important;display:block!important;}
  .right-col{margin-top:32px;}
  .fg-2{grid-template-columns:1fr!important;}
  .chk-row{padding:18px 16px 20px!important;}
  .btn-submit{min-height:52px;}

  /* CONTACT */
  .ph-h{font-size:36px!important;}

  /* PORTALS — sidebar to bottom tabs */
  .sb,aside.sb,aside.sidebar{display:none!important;}
  .main{margin-left:0!important;padding-bottom:80px!important;}
  .topbar{padding:0 16px!important;height:56px!important;}
  .content{padding:24px 16px 80px!important;}
  .stats{grid-template-columns:1fr 1fr!important;gap:12px!important;}
  .stats .sc{padding:18px 18px!important;}
  .sc-num{font-size:34px!important;}
  .pg-greeting{font-size:28px!important;}
  .pg-h{font-size:26px!important;}

  /* Client/Principal mobile bottom tab bar visibility */
  .mob-tabs,.btab-bar{display:flex!important;}

  .insp-row{flex-direction:column!important;gap:12px!important;align-items:flex-start!important;padding:16px!important;}

@media(max-width:380px){
  .hero h1{font-size:38px!important;}

<body>
<nav>
  <a href="Homepage.html" class="nav-logo">
    <svg width="26" height="26" viewBox="0 0 60 60" fill="#C0A870"><path d="M 5,60 L 5,35 A 25,25 0 0,1 55,35 L 55,60 L 44,60 L 44,35 A 14,14 0 0,0 16,35 L 16,60 Z"/></svg>
    <div><div class="wm">ROKHAVEN</div><div class="sm">REALTY</div></div>
  </a>
  <a href="Client Login.html" class="nav-back">← Back to Login</a>
</nav>
<div class="page">
  <div class="card">
    <div class="card-logo">
      <svg width="22" height="22" viewBox="0 0 60 60" fill="#C0A870"><path d="M 5,60 L 5,35 A 25,25 0 0,1 55,35 L 55,60 L 44,60 L 44,35 A 14,14 0 0,0 16,35 L 16,60 Z"/></svg>
      <div><div class="wm">ROKHAVEN</div><div class="sm">REALTY</div></div>
    </div>
    <div class="card-lbl">New Client</div>
    <h1 class="card-h">Create Your Profile</h1>
    <p class="card-sub">Join RokHaven and start your property journey.</p>

    <div class="f-row">
      <label class="f-lbl">Full Name</label>
      <div class="f-wrap"><input class="f-in" type="text" placeholder="Adaeze Okonkwo" autocomplete="name"/></div>
    </div>
    <div class="f-row">
      <label class="f-lbl">Email Address</label>
      <div class="f-wrap"><input class="f-in" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    </div>
    <div class="f-row">
      <label class="f-lbl">Phone Number</label>
      <div class="ph-row">
        <span class="ph-flag">🇳🇬 +234</span>
        <input class="f-in" type="tel" placeholder="080 — — — — —" autocomplete="tel"/>
      </div>
    </div>
    <div class="f-row">
      <label class="f-lbl">Password</label>
      <div class="f-wrap">
        <input class="f-in" type="password" placeholder="Min. 8 characters" id="pw1" oninput="checkStrength(this.value)"/>
        <button class="f-eye" onclick="tp('pw1',this)">👁</button>
      </div>
      <div class="pw-str"><div class="pw-bar" id="pb1"></div><div class="pw-bar" id="pb2"></div><div class="pw-bar" id="pb3"></div></div>
      <div class="pw-txt" id="pwTxt">Enter a password</div>
    </div>
    <div class="f-row">
      <label class="f-lbl">Confirm Password</label>
      <div class="f-wrap">
        <input class="f-in" type="password" placeholder="Repeat your password" id="pw2"/>
        <button class="f-eye" onclick="tp('pw2',this)">👁</button>
      </div>
    </div>

    <button class="btn-gold" onclick="createAccount()">Create Account →</button>
    <p class="terms">By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    <div class="card-rule"></div>
    <div class="card-foot">Already have an account? <a href="Client Login.html">Sign In →</a></div>
  </div>
</div>

<script>
function tp(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}
function checkStrength(v){
  const b=[document.getElementById('pb1'),document.getElementById('pb2'),document.getElementById('pb3')];
  const t=document.getElementById('pwTxt');
  b.forEach(x=>{x.className='pw-bar';});
  if(!v){t.textContent='Enter a password';return;}
  const score=(v.length>=8?1:0)+(v.length>=12?1:0)+(/[A-Z]/.test(v)&&/[0-9!@#$]/.test(v)?1:0);
  if(score===1){b[0].classList.add('weak');t.textContent='Weak';}
  else if(score===2){b[0].classList.add('fair');b[1].classList.add('fair');t.textContent='Fair';}
  else{b.forEach(x=>x.classList.add('strong'));t.textContent='Strong';}
}
function createAccount(){alert('Account created! Welcome to RokHaven. Check your email for your login details.');}
</script>
</body>
</html>
